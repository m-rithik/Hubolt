# Bitbucket Pipelines for Hubolt.
#
# - Pull requests and main: install, typecheck, test, build.
#   Tests are fully mocked (no Postgres/Redis needed in CI).
# - main also deploys: SSH into the server, which pulls latest, builds,
#   migrates the database, and restarts the systemd service.
#
# No Docker and no image registry. Application secrets live ONLY in the
# server's /opt/hubolt/.env file. Bitbucket only needs the deploy SSH key
# (configured under Repository settings > Pipelines > SSH keys) and two
# repository variables: DEPLOY_USER and DEPLOY_HOST.

image: node:20

definitions:
  caches:
    npmcache: ~/.npm
  services:
    # Postgres for the schema drift check (migrations vs prisma schema). The
    # default user is a superuser, so Prisma can create/reset the shadow DB.
    postgres:
      image: postgres:16-alpine
      variables:
        POSTGRES_DB: hubolt_ci
        POSTGRES_USER: hubolt
        POSTGRES_PASSWORD: hubolt_ci
  steps:
    - step: &test-build
        name: Test and build
        caches:
          - npmcache
        services:
          - postgres
        script:
          - npm ci
          - npm run typecheck
          - npm test
          - npm run build
          # Fail the build if the committed migrations do not produce the schema
          # the Prisma client expects (catches "deploy is green but runtime 500s").
          - export DATABASE_URL="postgresql://hubolt:hubolt_ci@localhost:5432/hubolt_ci"
          - export SHADOW_DATABASE_URL="postgresql://hubolt:hubolt_ci@localhost:5432/hubolt_ci_shadow"
          - npm run db:check-drift

pipelines:
  pull-requests:
    '**':
      - step: *test-build
  branches:
    main:
      - step: *test-build
      - step:
          name: Deploy to server
          deployment: production
          trigger: manual   # remove this line to deploy automatically on every green main build
          script:
            # The SSH key and the server host key are configured in
            # Repository settings > Pipelines > SSH keys. No private key in the repo.
            - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd /opt/hubolt && bash deploy/deploy.sh"

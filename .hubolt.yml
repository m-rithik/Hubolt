mode: security
severityThreshold: medium
failOnSeverity: critical
commentBudget: 8
maxFileSizeKb: 256
maxContextTokens: 60000

providers:
  llm: openai
  model: gpt-4.1-mini

privacy:
  redactSecrets: true
  showContextSentToModel: true
  allowExternalModels: true

rules: []
integrations:
  slack:
    enabled: true
    minSeverity: info
  teams:
    enabled: true
    minSeverity: info

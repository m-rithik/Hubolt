services:
  postgres:
    image: postgres:16-alpine
    container_name: hubolt-postgres
    environment:
      POSTGRES_USER: hubolt
      POSTGRES_PASSWORD: hubolt_dev
      POSTGRES_DB: hubolt_db
    ports:
      - "5432:5432"
    volumes:
      - hubolt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hubolt -d hubolt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hubolt-redis
    ports:
      - "6379:6379"
    volumes:
      - hubolt_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hubolt_postgres_data:
  hubolt_redis_data:
